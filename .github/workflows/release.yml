name: Release

# Dispara ao dar push numa tag vX.Y.Z (ou manualmente).
on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write

env:
  # Versao dos binarios do llama.cpp a empacotar. Bump aqui para atualizar.
  LLAMA_TAG: b9723

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            llama_variant: win-vulkan-x64
            ext: zip
            tauri_args: "--bundles nsis"
          - os: ubuntu-22.04
            llama_variant: ubuntu-vulkan-x64
            ext: tar.gz
            tauri_args: "--bundles deb,appimage"
          - os: macos-latest # Apple Silicon (arm64)
            llama_variant: macos-arm64
            ext: tar.gz
            tauri_args: "--bundles dmg"
          - os: macos-13 # Intel (x64)
            llama_variant: macos-x64
            ext: tar.gz
            tauri_args: "--bundles dmg"
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Dependencias do sistema (Linux/Tauri)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev build-essential curl wget file \
            libxdo-dev libssl-dev libayatana-appindicator3-dev librsvg2-dev

      - uses: dtolnay/rust-toolchain@stable

      - uses: swatinem/rust-cache@v2
        with:
          workspaces: ./src-tauri -> target

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Instalar deps do frontend
        run: npm install

      - name: Baixar runtime do llama.cpp (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force src-tauri/binaries | Out-Null
          $asset = "llama-${{ env.LLAMA_TAG }}-bin-${{ matrix.llama_variant }}.${{ matrix.ext }}"
          $url = "https://github.com/ggml-org/llama.cpp/releases/download/${{ env.LLAMA_TAG }}/$asset"
          Invoke-WebRequest $url -OutFile llama.zip
          Expand-Archive llama.zip -DestinationPath src-tauri/binaries -Force

      - name: Baixar runtime do llama.cpp (Linux/macOS)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          mkdir -p src-tauri/binaries
          asset="llama-${LLAMA_TAG}-bin-${{ matrix.llama_variant }}.${{ matrix.ext }}"
          url="https://github.com/ggml-org/llama.cpp/releases/download/${LLAMA_TAG}/${asset}"
          curl -L -o llama.tar.gz "$url"
          # os tarballs extraem para uma pasta llama-<tag>/ ; achatamos com strip-components
          tar -xzf llama.tar.gz -C src-tauri/binaries --strip-components=1
          chmod +x src-tauri/binaries/llama-server || true

      - name: Build + anexar ao Release (tauri-action)
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "TaylorAI Studio ${{ github.ref_name }}"
          releaseBody: "Builds automaticos via CI (Windows / Linux / macOS). Runtime do llama.cpp ${{ env.LLAMA_TAG }} incluso. Apenas o Windows foi testado no hardware-alvo; Linux/macOS sao build de CI."
          releaseDraft: false
          prerelease: false
          args: ${{ matrix.tauri_args }}
